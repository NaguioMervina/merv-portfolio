name: Refresh GitLab Contributions

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm run refresh:gitlab
        env:
          GITLAB_USERNAME: NaguioMervina

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resources/js/data/gitlab-contributions.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh GitLab contributions [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
